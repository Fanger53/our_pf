version: '3.8'

services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: rails_user
      POSTGRES_PASSWORD: rails
      POSTGRES_DB: our_pf
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rails_user -d our_pf"]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    build: .
    ports:
      - "3000:3000"
    volumes:
      - .:/app
      - bundle_cache:/usr/local/bundle
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://rails_user:rails@db:5432/our_pf
      RAILS_ENV: development
      BUNDLE_PATH: /usr/local/bundle
    stdin_open: true
    tty: true
    command: >
      bash -c "
        bundle install &&
        bundle exec rails db:create db:migrate &&
        bundle exec rails server -b 0.0.0.0
      "

volumes:
  postgres_data:
  bundle_cache: